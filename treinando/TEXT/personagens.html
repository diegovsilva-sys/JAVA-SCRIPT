<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagens - God of War</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="personagens.html">Personagens</a>
    </nav>

    <section class="container">
        <h2>Guerreiros de Midgard</h2>
        <div class="grid">
            <div class="card">
                <img src="assets/Kratos.jpg" alt="Kratos" class="card-img">
                <h3>Kratos</h3>
                <p>O Fantasma de Esparta, agora um pai em um mundo de deuses nórdicos.</p>
            </div>
            <div class="card">
                <img src="assets/Atreus.jpg" alt="Atreus" class="card-img">
                <h3>Atreus</h3>
                <p>O filho de Kratos, que busca entender sua própria identidade como Loki.</p>
            </div>
            <div class="card">
                <img src="assets/Freya.jpg" alt="Freya" class="card-img">
                <h3>Freya</h3>
                <p>Uma deusa poderosa e antiga aliada que se tornou uma inimiga implacável.</p>
            </div>
        </div>
    </section>

</body>
</html>
